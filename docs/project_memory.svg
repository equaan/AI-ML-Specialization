<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120" role="img" aria-labelledby="title desc">
  <title id="title">MediAgent Project Memory</title>
  <desc id="desc">A graphical memory of the MediAgent repository showing runtime flow, repository structure, and demo stack.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4efe4"/>
      <stop offset="55%" stop-color="#e7f0eb"/>
      <stop offset="100%" stop-color="#d9e4f2"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf7"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#16324f" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#315c4a"/>
    </marker>
    <style>
      text { font-family: "Segoe UI", Arial, sans-serif; fill: #14202b; }
      .title { font-size: 38px; font-weight: 700; }
      .subtitle { font-size: 18px; fill: #425466; }
      .section { font-size: 22px; font-weight: 700; }
      .card { fill: url(#card); stroke: #c9d5df; stroke-width: 2; rx: 26; filter: url(#shadow); }
      .pill { fill: #edf5ef; stroke: #9ebca8; stroke-width: 1.5; rx: 18; }
      .pill-blue { fill: #e8f0fb; stroke: #9cb5d4; stroke-width: 1.5; rx: 18; }
      .pill-gold { fill: #fbf2dd; stroke: #d6be73; stroke-width: 1.5; rx: 18; }
      .node { fill: #ffffff; stroke: #afbfcb; stroke-width: 2; rx: 20; }
      .node-green { fill: #eff8f1; stroke: #91b39a; stroke-width: 2; rx: 20; }
      .node-blue { fill: #eef4fb; stroke: #91aace; stroke-width: 2; rx: 20; }
      .node-gold { fill: #fff6e6; stroke: #d5b36a; stroke-width: 2; rx: 20; }
      .label { font-size: 18px; font-weight: 700; }
      .small { font-size: 15px; fill: #4e5f6f; }
      .tiny { font-size: 13px; fill: #5d6c7c; }
      .mono { font-family: Consolas, "Courier New", monospace; font-size: 14px; fill: #314454; }
      .line { stroke: #315c4a; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .soft-line { stroke: #607a8e; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .divider { stroke: #d2dce5; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1600" height="1120" fill="url(#bg)"/>
  <circle cx="1420" cy="130" r="180" fill="#ffffff" opacity="0.35"/>
  <circle cx="170" cy="980" r="220" fill="#fffdf5" opacity="0.4"/>

  <text x="70" y="78" class="title">MediAgent Project Memory</text>
  <text x="70" y="112" class="subtitle">Multimodal clinical decision support prototype: repo map, runtime path, and analysis graph in one glance.</text>

  <rect x="60" y="150" width="1480" height="360" class="card"/>
  <text x="90" y="195" class="section">1. Live Analysis Flow</text>

  <rect x="95" y="230" width="210" height="120" class="node-gold"/>
  <text x="120" y="268" class="label">Input Channels</text>
  <text x="120" y="295" class="small">Symptoms text</text>
  <text x="120" y="320" class="small">Image, PDF lab report</text>
  <text x="120" y="345" class="small">Voice note</text>

  <rect x="355" y="230" width="230" height="120" class="node-blue"/>
  <text x="380" y="268" class="label">FastAPI Backend</text>
  <text x="380" y="295" class="small">[backend/main.py]</text>
  <text x="380" y="320" class="small">upload save, validation,</text>
  <text x="380" y="345" class="small">session + export endpoints</text>

  <rect x="635" y="210" width="255" height="70" class="pill"/>
  <text x="660" y="252" class="label">VoiceInputProcessor</text>
  <rect x="635" y="300" width="255" height="70" class="pill"/>
  <text x="684" y="342" class="label">PDFParser</text>

  <rect x="940" y="215" width="230" height="135" class="node-green"/>
  <text x="965" y="253" class="label">LangGraph Orchestrator</text>
  <text x="965" y="280" class="small">[backend/agents/orchestrator.py]</text>
  <text x="965" y="307" class="small">vision -&gt; rag -&gt; report</text>
  <text x="965" y="332" class="small">conditional start skips vision</text>

  <rect x="1210" y="190" width="260" height="70" class="pill-blue"/>
  <text x="1267" y="232" class="label">Vision Agent</text>
  <rect x="1210" y="280" width="260" height="70" class="pill-blue"/>
  <text x="1282" y="322" class="label">RAG Agent</text>
  <rect x="1210" y="370" width="260" height="70" class="pill-blue"/>
  <text x="1267" y="412" class="label">Report Agent</text>

  <rect x="940" y="390" width="230" height="85" class="node-gold"/>
  <text x="975" y="428" class="label">Persistent Outputs</text>
  <text x="975" y="455" class="small">session report store +</text>
  <text x="975" y="478" class="small">JSON / Markdown / PDF export</text>

  <path d="M305 290 L355 290" class="line"/>
  <path d="M585 290 L635 245" class="soft-line"/>
  <path d="M585 290 L635 335" class="soft-line"/>
  <path d="M890 245 L940 245" class="line"/>
  <path d="M890 335 L940 335" class="line"/>
  <path d="M1170 245 L1210 225" class="line"/>
  <path d="M1170 282 L1210 315" class="line"/>
  <path d="M1170 335 L1210 405" class="line"/>
  <path d="M1055 350 L1055 390" class="line"/>

  <rect x="90" y="380" width="700" height="95" class="node"/>
  <text x="115" y="417" class="label">Normalized context assembled before inference</text>
  <text x="115" y="445" class="small">Symptoms + voice transcript + PDF summary become the shared patient context passed into the agent pipeline.</text>

  <rect x="60" y="540" width="920" height="510" class="card"/>
  <text x="90" y="585" class="section">2. Repository Memory Map</text>

  <rect x="95" y="620" width="255" height="145" class="node-blue"/>
  <text x="120" y="658" class="label">backend/</text>
  <text x="120" y="686" class="small">FastAPI app, schemas, utils</text>
  <text x="120" y="711" class="small">agents/, tools/, rag/</text>
  <text x="120" y="736" class="tiny">Core intelligence lives here</text>

  <rect x="385" y="620" width="255" height="145" class="node-green"/>
  <text x="410" y="658" class="label">frontend/</text>
  <text x="410" y="686" class="small">React + Vite clinical workspace</text>
  <text x="410" y="711" class="small">analysis, results, evidence,</text>
  <text x="410" y="736" class="small">trace, status, records pages</text>

  <rect x="675" y="620" width="255" height="145" class="node-gold"/>
  <text x="700" y="658" class="label">scripts/</text>
  <text x="700" y="686" class="small">demo launcher, ingestion,</text>
  <text x="700" y="711" class="small">evaluation and setup helpers</text>
  <text x="700" y="736" class="tiny">Operational glue for demos</text>

  <rect x="95" y="800" width="255" height="145" class="node"/>
  <text x="120" y="838" class="label">tests/</text>
  <text x="120" y="866" class="small">API, parser, RAG, report,</text>
  <text x="120" y="891" class="small">vision, and pipeline checks</text>

  <rect x="385" y="800" width="255" height="145" class="node"/>
  <text x="410" y="838" class="label">docs/</text>
  <text x="410" y="866" class="small">PRD, prompts, TODOs,</text>
  <text x="410" y="891" class="small">progress and architecture notes</text>

  <rect x="675" y="800" width="255" height="145" class="node"/>
  <text x="700" y="838" class="label">data/ + manual-test/</text>
  <text x="700" y="866" class="small">sample inputs, local Chroma data,</text>
  <text x="700" y="891" class="small">benchmarks, PDFs, images, cases</text>

  <line x1="365" y1="610" x2="365" y2="955" class="divider"/>
  <line x1="655" y1="610" x2="655" y2="955" class="divider"/>
  <line x1="85" y1="782" x2="940" y2="782" class="divider"/>

  <rect x="1020" y="540" width="520" height="240" class="card"/>
  <text x="1050" y="585" class="section">3. Default Demo Runtime</text>
  <rect x="1055" y="620" width="450" height="110" class="node-blue"/>
  <text x="1080" y="658" class="label">scripts/start_demo_stack.ps1</text>
  <text x="1080" y="686" class="small">Kills stale ports, launches Ollama, backend, frontend, then ngrok.</text>
  <text x="1080" y="711" class="small">Writes tunnel URL to `ngrok_url.txt` and probes `/health` + `/stats`.</text>

  <rect x="1020" y="810" width="520" height="240" class="card"/>
  <text x="1050" y="855" class="section">4. Key Mental Model</text>
  <text x="1050" y="895" class="small">MediAgent is not just an API or a UI.</text>
  <text x="1050" y="925" class="small">It is a multimodal intake pipeline that turns mixed evidence</text>
  <text x="1050" y="955" class="small">into one structured clinical report, then keeps that report</text>
  <text x="1050" y="985" class="small">navigable through results, evidence, lab, trace, status,</text>
  <text x="1050" y="1015" class="small">and records views in the frontend workspace.</text>

  <text x="70" y="1082" class="mono">Primary anchors: README.md | backend/main.py | backend/agents/orchestrator.py | scripts/start_demo_stack.ps1</text>
</svg>
